<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ERROR 404: Tenant didn't find</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 40px;
        }

        h1 {
            font-size: 72px;
            margin-bottom: 20px;
            color: #f87171;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        p {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>ERROR 404: Tenant didn't find</h2>
        <p>The tenant you are looking for does not exist or may have been removed.</p>
        <!-- <a href="/" class="btn">Go to Home</a> -->
    </div>

</body>
</html>
